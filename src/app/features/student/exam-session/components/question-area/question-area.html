<article class="question-card">
  <div class="card-top-bar">
    <h2 class="question-title" [dir]="textDirection(title())">{{ title() }}</h2>
  </div>

  @if (questType() === essay) {
    @if (imageUrl() !== '' && imageUrl() !== undefined) {
      <div class="image-container">
        <img class="question-image" [src]="imageUrl()" />
      </div>
    }

    <div class="answer-area">
      <textarea
        name="answer"
        id="answer"
        rows="5"
        class="form-control"
        [dir]="textDirection(essayValue())"
        placeholder="Write your answer here"
        [value]="essayValue()"
        (input)="essayAnswer.emit($any($event.target).value)"
      ></textarea>
    </div>

    @if (navigationBlocked()) {
      <div
        class="alert alert-warning mt-3 mb-2 py-2"
        role="alert"
        title="Please save your essay answer before navigating"
      >
        Please save your answer before moving to another question.
      </div>
    }

    <button
      type="button"
      class="btn btn-primary w-100 mt-2"
      [disabled]="!isDirty() || isSavingEssay()"
      (click)="saveEssay.emit()"
    >
      {{ isSavingEssay() ? 'Saving...' : 'Save Answer' }}
    </button>
  } @else {
    <div class="options">
      @for (option of options(); track $index) {
        <label class="option-label" [class.selected]="selectedOptionId() === option.optionId">
          <input
            type="radio"
            name="questionOption"
            [value]="option.optionId"
            [checked]="selectedOptionId() === option.optionId"
            (change)="optionSelected.emit(option.optionId)"
          />
          <div class="custom-radio"></div>
          <span [dir]="textDirection(option.optionText)">{{ option.optionText }}</span>
        </label>
      }
    </div>
  }

  <div class="paging">
    <button type="button" class="btn-nav" (click)="previous.emit()" [disabled]="isFirst()">
      Previous
    </button>

    <button
      class="btn-mark"
      [class.marked]="isMarked()"
      (click)="toggleMark.emit()"
      title="Mark Question"
    >
      <i class="bi bi-flag-fill"></i>
    </button>

    <button type="button" class="btn-nav" (click)="next.emit()" [disabled]="isLast()">Next</button>
  </div>
</article>
