<div class="result-card" [class]="statusMeta().colorClass">
  <div class="card-header">
    <span class="status-badge">
      <i [class]="statusMeta().icon"></i>
      {{ statusMeta().label }}
    </span>
    <div class="card-icon" class="{{statusMeta().colorClass}}">
      <i class="bi" [class]="statusMeta().icon"></i>
    </div>
  </div>

  <div class="card-body">
    <h3 class="exam-title">{{ result.examTitle }}</h3>
    <!-- <p class="exam-subtitle">Assessment Session</p> -->
  </div>

  <div class="card-footer">
    <div class="score-container">
      <span class="score-value" [ngClass]="getScoreColor(result)">
        {{ result.studentScore | number : '1.1-1' }}
      </span>
      <span class="score-total">/ {{ result.examMaxScore }}</span>
    </div>

    <button
      type="button"
      class="view-results-btn"
      [routerLink]="['/main/student/past-results', result.examId]" 
    >
      View Results
      <i class="bi bi-arrow-right"></i>
    </button>
  </div>
</div>
