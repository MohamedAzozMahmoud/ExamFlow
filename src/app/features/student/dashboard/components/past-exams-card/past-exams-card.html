<section class="exam-card">
  <header class="card-header">
    <h5 class="card-title">Past Exams</h5>
    <span class="card-icon" aria-hidden="true">
      <i class="bi bi-clock-history"></i>
    </span>
  </header>

  @for (exam of exams(); track exam.examId) {
    @if (exam.examStatus !== ExamStatus.InProgress) {
      <article class="exam-item">
        <div class="row-top">
          <h6 class="exam-name">{{ exam.examTitle }}</h6>
          <div class="score">
            <span class="score-main">{{ exam.studentScore }}</span>
            <span class="score-max">/{{ exam.examMaxScore }}</span>
          </div>
        </div>
        <span
          class="exam-status"
          [class.status-absent]="exam.examStatus === ExamStatus.NotStarted"
          [class.status-progress]="exam.examStatus === ExamStatus.Completed"
          [class.status-evaluating]="exam.examStatus === ExamStatus.Flushed"
          [class.status-pending]="exam.examStatus === ExamStatus.PendingEassysManualGrading"
          [class.status-graded]="exam.examStatus === ExamStatus.AllGraded"
        >
          {{ getExamStatus(exam.examStatus) }}
        </span>
      </article>
    }
  } @empty {
    <p class="empty">
      <i class="bi bi-mortarboard-fill"></i>
    </p>
  }
</section>
