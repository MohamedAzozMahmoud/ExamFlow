<div class="dashboard-container">
  <div class="dashboard-grid">
    <div class="upcoming-slot">
      <app-upcoming-exams-card [exams]="facade.futureExams()" />
    </div>

    <div class="past-slot">
      <app-past-exams-card [exams]="facade.pastExams()" />
    </div>

    <div class="active-slot">
      <app-active-exams-card
        [activeExam]="facade.activeExam()"
        [countdown]="facade.activeExamCountdown()"
      />
    </div>
  </div>
</div>
