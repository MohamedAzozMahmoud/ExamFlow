@if (loadingService.isLoading()) {
  <div class="loading-overlay d-flex flex-column justify-content-center align-items-center">
    <div class="loader-wrapper">
      <div class="ring ring-teal"></div>
      <div class="ring ring-orange"></div>
      <div class="logo-box">
        <img src="Logo.svg" alt="Logo" class="loading-logo">
      </div>
    </div>
    <h5 class="loading-text mt-4 fw-bold">Loading...</h5>
  </div>
}
