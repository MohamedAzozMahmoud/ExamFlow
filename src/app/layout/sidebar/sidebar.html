<aside
  class="sidebar"
  [class.is-toggled]="toggle.value()"
  [class.force-hidden]="toggle.isExamMode()"
  [class.student-mode]="isStudent()"
  role="complementary"
  aria-label="Sidebar navigation"
>
  <!-- Close button (hamburger) -->
  @if (!isStudent()) {
    <div class="close-btn-container">
      <button
        type="button"
        class="btn-close-sidebar"
        (click)="onCloseClick()"
        aria-label="Toggle sidebar"
      >
        <i class="bi bi-list" style="font-weight: bold; font-size: 1.5rem"></i>
      </button>
    </div>

    <!-- Brand (Admin only) -->
    <div class="sidebar-brand">
      <span class="brand-text">EXAMFLOW</span>
    </div>

    <!-- Admin User Profile -->
    <div class="user-profile">
      <div class="user-avatar">
        <i class="bi bi-person-fill"></i>
      </div>
      <div class="user-info">
        <p class="user-name">{{ userName() }}</p>
        <p class="user-role-label">{{ userRole() }}</p>
      </div>
    </div>
  }

  <!-- Student Profile (Welcome back layout) -->
  @if (isStudent()) {
    <div class="student-profile">
      <div class="student-avatar-container">
        <div class="student-avatar">
          <i class="bi bi-person-fill"></i>
        </div>
      </div>
      <div class="student-info">
        <p class="student-welcome">Welcome back</p>
        <p class="student-name">{{ userName() }}</p>
      </div>
    </div>
  }

  <!-- Navigation -->
  <nav class="sidebar-nav" role="navigation" aria-label="Main navigation">
    <ul class="nav-list">
      @for (item of navItems(); track $index) {
        <li class="nav-item">
          <a
            [routerLink]="[url(item.route)]"
            (click)="onNavClick(item.route)"
            class="nav-link"
            routerLinkActive="active"
            [attr.aria-current]="activeRoute() === item.route ? 'page' : null"
          >
            @if (isStudent()) {
              <i class="bi {{ item.icon }} nav-icon"></i>
            } @else {
              <img
                [ngSrc]="item.icon"
                width="24"
                height="24"
                alt="{{ item.label }}"
                class="nav-icon"
                loading="lazy"
              />
            }
            <span class="nav-label">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <button type="button" (click)="onLogout()" class="logout-btn">
      <img ngSrc="Logout.svg" width="14" height="14" alt="Logout" class="logout-icon" />
      <span>Logout</span>
    </button>
  </div>
</aside>
